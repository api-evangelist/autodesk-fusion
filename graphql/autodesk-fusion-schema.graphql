  height: Int!
  cameraSettings: CameraSettings
  environmentSettings: RenderEnvironment
  outputUrl: URL
  created: DateTime
  completed: DateTime
}

type RenderJobConnection {
  nodes: [RenderJob!]!
  pageInfo: PageInfo!
  totalCount: Int
}

type CameraSettings {
  eye: Point3D!
  target: Point3D!
  up: Vector3D!
  fieldOfView: Float
  aspectRatio: Float
  nearDistance: Float
  farDistance: Float
}

type RenderEnvironment {
