  totalCount: Int
}

type ExportOptions {
  unit: DistanceUnits
  includeSketchEntities: Boolean
  sendEmailWhenDone: Boolean
  geometry: String
}

# ---------------------------------------------------------------------------
# Root Operations
# ---------------------------------------------------------------------------

type Query {
  """Retrieve all hubs accessible to the current user."""
  hubs(first: Int, after: String): HubConnection!

  """Retrieve a single hub by ID."""
  hub(id: ID!): Hub

  """Retrieve a project by ID."""
  project(hubId: ID!, projectId: ID!): Project

  """Retrieve an item by ID."""
  item(projectId: ID!, itemId: ID!): Item

  """Retrieve a specific version of an item."""
  version(itemId: ID!, versionId: ID!): Version

  """Retrieve a design from a version."""
  design(versionId: ID!): Design

  """Retrieve a component by ID within a design."""
  component(designId: ID!, componentId: ID!): Component

  """Retrieve a B-Rep body by ID."""
  bRepBody(designId: ID!, bodyId: ID!): BRepBody

  """Retrieve a sketch by ID."""
  sketch(designId: ID!, sketchId: ID!): Sketch

  """Retrieve a parameter by name within a design."""
  parameter(designId: ID!, name: String!): Parameter

  """Retrieve a material by ID."""
  material(id: ID!): Material

  """Retrieve an appearance by ID."""
  appearance(id: ID!): Appearance

  """Retrieve a joint by ID within a design."""
  joint(designId: ID!, jointId: ID!): Joint

  """Retrieve all features of a specific type from a component."""
  features(
    designId: ID!
    componentId: ID!
    featureType: FeatureType
    first: Int
    after: String
  ): FeatureConnection!

  """Retrieve the timeline of a design."""
  timeline(designId: ID!): Timeline

  """Retrieve all CAM setups for a design version."""
  camSetups(versionId: ID!, first: Int, after: String): CAMSetupConnection!

  """Retrieve a CAM operation by ID."""
  camOperation(setupId: ID!, operationId: ID!): CAMOperation

  """Retrieve simulation studies for a design version."""
  simulationStudies(
    versionId: ID!
    first: Int
    after: String
  ): SimulationStudyConnection!

  """Retrieve a simulation study by ID."""
  simulationStudy(id: ID!): SimulationStudy

  """Retrieve render jobs for a version."""
  renderJobs(versionId: ID!, first: Int, after: String): RenderJobConnection!

  """Retrieve the Bill of Materials for a design version."""
  billOfMaterials(versionId: ID!, options: BomOptions): BillOfMaterials

  """Retrieve exports for a version."""
  exports(versionId: ID!, first: Int, after: String): ExportConnection!
}

type Mutation {
  """Update a parameter value or expression in a design."""
  updateParameter(
    designId: ID!
    parameterId: ID!
    expression: String!
  ): Parameter!

  """Suppress or unsuppress a feature in the design timeline."""
  setFeatureSuppressed(
    designId: ID!
    featureId: ID!
    isSuppressed: Boolean!
  ): Feature!

  """Assign a material to a component or body."""
  assignMaterial(
    targetId: ID!
    targetType: String!
    materialId: ID!
  ): Boolean!

  """Assign an appearance to a component, body, or face."""
  assignAppearance(
    targetId: ID!
    targetType: String!
    appearanceId: ID!
  ): Boolean!

  """Request an export of a design version to a specific format."""
  createExport(
    versionId: ID!
    format: ExportFormat!
    options: ExportOptionsInput
  ): Export!

  """Launch a cloud render job for a design version."""
  createRenderJob(
    versionId: ID!
    quality: RenderQuality!
    width: Int!
    height: Int!
    camera: CameraSettingsInput
  ): RenderJob!

  """Create a new simulation study for a design version."""
  createSimulationStudy(
    versionId: ID!
    name: String!
    simulationType: SimulationType!
  ): SimulationStudy!

  """Run a simulation study (triggers cloud solve)."""
  runSimulationStudy(studyId: ID!): SimulationStudy!

  """Update the name of a component."""
  updateComponentName(
    designId: ID!
    componentId: ID!
    name: String!
  ): Component!

  """Set the grounded state of an occurrence in an assembly."""
  setOccurrenceGrounded(
    designId: ID!
    occurrenceId: ID!
    isGrounded: Boolean!
  ): Occurrence!

  """Lock or unlock a joint."""
  setJointLocked(
    designId: ID!
    jointId: ID!
    isLocked: Boolean!
  ): Joint!

  """Generate a toolpath for a CAM operation."""
  generateToolpath(operationId: ID!): CAMOperation!

  """Post-process a CAM setup to NC code."""
  postProcess(
    setupId: ID!
    postProcessorId: String!
    outputFileName: String!
  ): CAMPostResult!
}

type CAMPostResult {
  success: Boolean!
  ncCode: String
  warnings: [String!]
  errors: [String!]
}

input ExportOptionsInput {
  unit: DistanceUnits
  includeSketchEntities: Boolean
  sendEmailWhenDone: Boolean
}

input CameraSettingsInput {
  eye: Point3DInput!
  target: Point3DInput!
  up: Vector3DInput!
  fieldOfView: Float
}

input Point3DInput {
  x: Float!
  y: Float!
  z: Float!
}

input Vector3DInput {
  x: Float!
  y: Float!
  z: Float!
}
