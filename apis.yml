- aid: autodesk-fusion:manufacturing-data-model-api
  name: Manufacturing Data Model API (Fusion Data API)
  description: The Manufacturing Data Model API exposes Fusion design and manufacturing
    data through a GraphQL interface, enabling cloud-based read and write access to
    component properties, Bill of Materials, model hierarchy, and thumbnail assets.
    Allows programmatic access to granular design data without requiring the Fusion
    desktop application. Generally available since 2022.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://aps.autodesk.com/en/docs/mfgdataapi/v2/developers_guide/explorer/
