- aid: autodesk-fusion:fusion-automation-api
  name: Fusion Automation API (Design Automation)
  description: The Fusion Automation API is a cloud-based Premium API that runs Fusion
    scripts and automation jobs at scale without requiring desktop software. It supports
    parametric design customization, advanced manufacturing algorithms (packing, toolpath
    generation), and end-to-end workflow integration. Priced at 3.0 Flex tokens per
    processing hour on a pay-per-use basis.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://aps.autodesk.com/blog/design-automation-api-fusion-now-generally-available
  baseURL: https://developer.api.autodesk.com
  tags:
