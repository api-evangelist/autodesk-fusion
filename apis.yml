aid: autodesk-fusion
name: Autodesk Fusion
description: Autodesk Fusion is a cloud-based CAD/CAM/CAE/PCB platform that provides
  REST and GraphQL APIs for design data access, manufacturing automation, simulation,
  and shop-floor operations within the Autodesk Platform Services (APS) ecosystem.
  Developers can build scripts, add-ins, and integrations that automate workflows,
  sync production data, and connect Fusion with ERP, PLM, and BI systems.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/autodesk-fusion/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
