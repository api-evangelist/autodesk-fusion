apis:
- aid: autodesk-fusion:autodesk-fusion-api
  name: Autodesk Fusion API
  description: The Autodesk Fusion API enables developers to create scripts, add-ins,
    and cloud-connected applications that extend and automate Fusion design and manufacturing
    workflows. Built on Autodesk Platform Services, it supports OAuth 2.0 authentication
    and covers the entire design-to-manufacturing process including parametric modeling,
    simulation, and toolpath generation.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://aps.autodesk.com/developer/overview/autodesk-fusion-api
  baseURL: https://developer.api.autodesk.com
  tags:
