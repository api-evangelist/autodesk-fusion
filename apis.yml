- aid: autodesk-fusion:fusion-operations-api
  name: Fusion Operations API
  description: The Fusion Operations API provides REST endpoints to integrate Autodesk
    Fusion Operations (manufacturing execution system) production data with external
    enterprise systems. Supports bidirectional sync of production orders, inventory,
    machine status, downtime records, punch clock entries, workers, and operations
    with ERP, PLM, accounting, and BI platforms. Currently in Public Beta (V2).
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://aps.autodesk.com/developer/overview/fusion-operations-api
  baseURL: https://developer.api.autodesk.com
